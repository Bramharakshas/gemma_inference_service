name: Build Docker Image

on:
  push:
    branches: [ "main" ] # Triggers the build every time you push code to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Uses a free cloud Linux server provided by GitHub

    steps:
    - name: Check out the repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image (Dry Run)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false # Just builds to test for syntax/dependency errors without hosting yet